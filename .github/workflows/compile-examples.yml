name: Compile Examples

on:
  pull_request:
    paths:
      - ".github/workflows/compile-examples.yml"
      - "examples/**"
      - "src/**"
  push:
    paths:
      - ".github/workflows/compile-examples.yml"
      - "examples/**"
      - "src/**"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # libraries to install for all boards
      UNIVERSAL_LIBRARIES: |
        - source-path: ./
      # sketch paths to compile (recursive) for all boards
      UNIVERSAL_SKETCH_PATHS: |
        - examples/SE05XAESEncryptandDecrypt
        - examples/SE05XAESWriteKey
        - examples/SE05XCertificate
        - examples/SE05XHMAC
        - examples/SE05XImportPublicKey
        - examples/SE05XPrivateKey
        - examples/SE05XRandomNumber
        - examples/SE05XSerialNumber
        - examples/SE05XSignAndVerify

      SKETCHES_REPORTS_PATH: sketches-reports

    strategy:
      fail-fast: false

      matrix:
        board:
          - fqbn: arduino:mbed_portenta:envie_m7
            type: mbed_portenta
            artifact-name-suffix: arduino-mbed_portenta-envie_m7
          - fqbn: arduino:mbed_nicla:nicla_vision
            type: mbed_nicla
            artifact-name-suffix: arduino-mbed_nicla-nicla_vision
          - fqbn: arduino:mbed_opta:opta
            type: mbed_opta
            artifact-name-suffix: arduino-mbed_opta-opta
          - fqbn: arduino:mbed_giga:giga
            type: mbed_giga
            artifact-name-suffix: arduino-mbed_giga-giga
          - fqbn: arduino:renesas_portenta:portenta_c33
            type: renesas_portenta
            artifact-name-suffix: arduino-renesas_portenta-portenta_c33
          - fqbn: "arduino:zephyr_main:portentah7"
            platform-name: arduino:zephyr_main
            artifact-name-suffix: arduino-zephyr_main-portentah7
          - fqbn: "arduino:zephyr_main:portentac33"
            platform-name: arduino:zephyr_main
            artifact-name-suffix: arduino-zephyr_main-portentac33
          - fqbn: "arduino:zephyr_main:giga"
            platform-name: arduino:zephyr_main
            artifact-name-suffix: arduino-zephyr_main-giga
          - fqbn: "arduino:zephyr_main:opta"
            platform-name: arduino:zephyr_main
            artifact-name-suffix: arduino-zephyr_main-opta

        # make board type-specific customizations to the matrix jobs
        include:
          - board:
              platform-name: arduino:zephyr_main
              platforms: |
                # Install Arduino Zephyr Boards via Boards Manager
                - name: arduino:zephyr_main

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ESP32 platform dependencies
        if: matrix.board.type == 'esp32'
        run: pip3 install pyserial

      - name: Compile examples
        uses: arduino/compile-sketches@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ matrix.platforms }}
          fqbn: ${{ matrix.board.fqbn }}
          libraries: |
            ${{ env.UNIVERSAL_LIBRARIES }}
            ${{ matrix.libraries }}
          sketch-paths: |
            ${{ env.UNIVERSAL_SKETCH_PATHS }}
            ${{ matrix.sketch-paths }}
          enable-deltas-report: "true"
          sketches-report-path: ${{ env.SKETCHES_REPORTS_PATH }}

      - name: Save memory usage change report as artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sketches-report-${{ matrix.board.artifact-name-suffix }}
          path: ${{ env.SKETCHES_REPORTS_PATH }}
